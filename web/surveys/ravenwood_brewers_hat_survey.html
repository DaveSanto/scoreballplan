<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Ravenwood Brewers Hat Vote</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1923;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 32px 16px 60px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { font-size: 2rem; font-weight: 800; color: #f5c842; letter-spacing: 1px; }
  .header p { color: #aaa; margin-top: 8px; font-size: 1rem; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(245,200,66,0.12); border: 1px solid rgba(245,200,66,0.3);
    border-radius: 20px; padding: 4px 12px; font-size: 0.78rem; color: #f5c842; margin-top: 10px;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .instructions {
    max-width: 600px; margin: 0 auto 24px;
    background: #1a2535; border-radius: 12px; padding: 14px 18px;
    font-size: 0.9rem; color: #aaa; line-height: 1.6; text-align: center;
  }
  .instructions strong { color: #f5c842; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px; max-width: 1100px; margin: 0 auto 32px;
  }
  .card {
    background: #1a2535; border: 2px solid #2a3a50; border-radius: 14px;
    padding: 14px; cursor: pointer; transition: all 0.15s ease; position: relative;
    user-select: none;
  }
  .card:hover { border-color: #f5c842; background: #1f2e42; }
  .card.ranked { border-color: #f5c842; background: #1f2e42; }
  .card img { width: 100%; border-radius: 8px; display: block; background: #fff; }
  .card-label { margin-top: 10px; font-weight: 700; font-size: 0.9rem; color: #f0f0f0; }
  .card-sub { font-size: 0.78rem; color: #777; margin-top: 2px; }

  .rank-badge {
    position: absolute; top: 10px; left: 10px;
    width: 32px; height: 32px; border-radius: 50%;
    background: #f5c842; color: #0f1923;
    font-size: 15px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .rank-badge.empty {
    background: #2a3a50; color: #555; font-size: 11px; font-weight: 600;
    box-shadow: none;
  }

  .rank-hint {
    margin-top: 8px; font-size: 0.75rem; color: #555; text-align: center;
  }
  .card.ranked .rank-hint { color: #f5c842; font-weight: 600; }

  .progress-row {
    max-width: 600px; margin: 0 auto 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .progress-track { flex: 1; background: #2a3a50; border-radius: 20px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: #f5c842; border-radius: 20px; transition: width 0.3s; }
  .progress-label { font-size: 0.82rem; color: #aaa; white-space: nowrap; }

  .name-section { max-width: 400px; margin: 0 auto 20px; text-align: center; }
  .name-section label { display: block; color: #aaa; font-size: 0.9rem; margin-bottom: 8px; }
  .name-section input, .name-section select {
    width: 100%; padding: 12px 16px; border-radius: 10px;
    border: 2px solid #2a3a50; background: #1a2535; color: #f0f0f0;
    font-size: 1rem; outline: none; transition: border 0.2s;
    appearance: none; -webkit-appearance: none;
  }
  .name-section input:focus, .name-section select:focus { border-color: #f5c842; }
  .name-section select option { background: #1a2535; }

  .action-row { display: flex; gap: 12px; justify-content: center; align-items: center; margin-bottom: 8px; }
  .submit-btn {
    background: #f5c842; color: #0f1923; font-weight: 800; font-size: 1.05rem;
    padding: 13px 44px; border: none; border-radius: 50px; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .submit-btn:hover { background: #ffd84d; transform: scale(1.02); }
  .submit-btn:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; }
  .reset-btn {
    background: transparent; border: 1.5px solid #3a4a60; color: #777;
    font-size: 0.85rem; font-weight: 600; padding: 10px 20px;
    border-radius: 50px; cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { border-color: #f5c842; color: #f5c842; }

  /* Results */
  .results-wrap { max-width: 720px; margin: 0 auto; display: none; animation: fadein 0.4s ease; }
  .results-wrap.show { display: block; }
  @keyframes fadein { from { opacity:0; transform: translateY(10px); } to { opacity:1; } }

  .winner-card {
    background: linear-gradient(135deg, #1f2e42, #2a3a50);
    border: 2px solid #f5c842; border-radius: 16px;
    padding: 24px; text-align: center; margin-bottom: 28px;
    box-shadow: 0 0 0 4px rgba(245,200,66,0.15);
  }
  .winner-card .crown { font-size: 2.4rem; margin-bottom: 8px; }
  .winner-card h2 { color: #f5c842; font-size: 1.6rem; font-weight: 900; margin-bottom: 4px; }
  .winner-card .winner-sub { color: #aaa; font-size: 0.9rem; }
  .winner-card img { width: 220px; border-radius: 10px; margin: 14px auto 0; display: block; background: #fff; }

  .rounds-heading { color: #aaa; font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 16px; }

  .round-block { margin-bottom: 24px; }
  .round-label {
    font-size: 0.78rem; font-weight: 700; color: #f5c842; text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 10px;
  }
  .result-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; opacity: 1; transition: opacity 0.3s; }
  .result-row.eliminated { opacity: 0.35; }
  .result-row img { width: 64px; height: 46px; object-fit: cover; border-radius: 6px; background: #fff; flex-shrink: 0; }
  .result-label-wrap { flex: 1; }
  .result-label { font-weight: 700; font-size: 0.85rem; margin-bottom: 5px; }
  .bar-track { background: #2a3a50; border-radius: 20px; height: 20px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; background: #f5c842; border-radius: 20px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .bar-fill.winner-bar { background: #f5c842; }
  .bar-fill.eliminated-bar { background: #c0392b; }
  .bar-pct {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 0.72rem; font-weight: 800; color: #0f1923; mix-blend-mode: multiply;
  }
  .bar-pct-light {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 0.72rem; font-weight: 800; color: #f0f0f0;
  }
  .eliminated-label {
    font-size: 0.72rem; color: #c0392b; font-weight: 700; margin-top: 2px;
  }

  .total-label { text-align: center; color: #aaa; font-size: 0.85rem; margin-bottom: 24px; }
  .back-btn {
    display: block; margin: 24px auto 0; background: transparent;
    border: 2px solid #f5c842; color: #f5c842; font-weight: 700;
    padding: 10px 32px; border-radius: 50px; cursor: pointer;
    font-size: 0.95rem; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(245,200,66,0.1); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #f5c842; color: #0f1923; font-weight: 700;
    padding: 12px 28px; border-radius: 50px; font-size: 0.95rem;
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999;
  }
  .toast.show { opacity: 1; }
  .error-banner {
    background: #3a1515; border: 1px solid #c0392b; border-radius: 10px;
    padding: 12px 16px; margin: 0 auto 20px; max-width: 500px;
    text-align: center; font-size: 0.85rem; color: #e88;
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚾ Ravenwood Brewers Hat Vote</h1>
  <p>Rank your favorites for the 2026 season.</p>
  <div class="live-badge"><span class="live-dot"></span> Live results · Ranked choice</div>
</div>

<div id="errorBanner" class="error-banner" style="display:none"></div>

<div id="survey">
  <div class="instructions">
    <strong>Tap hats in order of preference</strong> — your favorite first, then second, and so on.
    Rank all 7 to submit. Tap a ranked hat to remove it.
  </div>

  <div class="name-section">
    <label>Your name (so we know who voted)</label>
    <div id="nameField"></div>
  </div>

  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 of 7 ranked</div>
  </div>

  <div class="grid" id="hatGrid"></div>

  <div class="action-row">
    <button class="reset-btn" onclick="resetRanking()">Reset</button>
    <button class="submit-btn" id="submitBtn" disabled>Submit Ranking</button>
  </div>
</div>

<div class="results-wrap" id="resultsPanel">
  <div class="winner-card" id="winnerCard"></div>
  <div class="total-label" id="totalLabel"></div>
  <div class="rounds-heading">Elimination Rounds</div>
  <div id="roundsContent"></div>
  <button class="back-btn" onclick="showSurvey()">← Rank Again / Change Vote</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDoc, setDoc, onSnapshot, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyC9A-Q0MlPWVojiHSt2T8KM282Pj58Qq0M",
  authDomain: "scoreballplan.firebaseapp.com",
  projectId: "scoreballplan",
  storageBucket: "scoreballplan.firebasestorage.app",
  messagingSenderId: "986759576199",
  appId: "1:986759576199:web:ee2c10b64ecc58c7979622",
});

const db = getFirestore(app);
const SURVEY_ID = 'ravenwood_brewers_hat';
const votesCol = collection(db, 'surveys', SURVEY_ID, 'votes');

// ── Name field (dropdown or text input) ───────────────────────────────────────
const teamId = new URLSearchParams(window.location.search).get('teamId');
let rosterNames = [];

function buildNameField() {
  const container = document.getElementById('nameField');
  if (rosterNames.length > 0) {
    const sel = document.createElement('select');
    sel.id = 'voterName';
    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = 'Select your name…';
    placeholder.disabled = true;
    placeholder.selected = true;
    sel.appendChild(placeholder);
    rosterNames.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', updateSubmitBtn);
    container.appendChild(sel);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.id = 'voterName';
    input.placeholder = 'e.g. Dave S.';
    input.addEventListener('input', updateSubmitBtn);
    container.appendChild(input);
  }
}

function getVoterName() {
  return (document.getElementById('voterName')?.value ?? '').trim();
}

function updateSubmitBtn() {
  document.getElementById('submitBtn').disabled = !(ranking.length === HATS.length && getVoterName());
}

const HATS = [
  { id: 'hat1', label: '212 — Navy/Gold', sub: 'Richardson 212 Fitted',
    img: 'https://richardson.picarioxpo.com/212_FINAL.pfs?1=1&width=600&height=356&p.tn=Navy.jpg,Navy.jpg,Gold.jpg,Gold.jpg,Gold.jpg,Gold.jpg' },
  { id: 'hat2', label: '212 — All Gold', sub: 'Richardson 212 Fitted',
    img: 'https://richardson.picarioxpo.com/212_FINAL.pfs?1=1&width=600&height=356&p.tn=Gold.jpg,Gold.jpg,Gold.jpg,Gold.jpg,Gold.jpg,Gold.jpg' },
  { id: 'hat3', label: '172 — Gold/White/Navy', sub: 'Richardson 172 Split Front',
    img: 'https://richardson.picarioxpo.com/172_FINAL.pfs?1=1&width=600&height=356&p.tn=Gold.jpg,white.jpg,Navy.jpg,Gold.jpg,Navy.jpg,Navy.jpg,white.jpg,white.jpg,white.jpg' },
  { id: 'hat4', label: '185 — Solid Navy', sub: 'Richardson 185 Wool Blend',
    img: 'https://richardson.picarioxpo.com/185_FINAL.pfs?1=1&width=600&height=356&p.tn=Navy.jpg,Navy.jpg,Navy.jpg,Navy.jpg,Navy.jpg,Navy.jpg' },
  { id: 'hat5', label: '112 — Cream/Navy/Amber', sub: 'Richardson 112 Trucker',
    img: 'https://richardson.picarioxpo.com/112_FINAL.pfs?1=1&width=600&height=356&p.tn=112cream.jpg,Navy.jpg,AmberGold.jpg,AmberGold.jpg,112cream.jpg,Navy.jpg' },
  { id: 'hat6', label: '112 — White/Columbia Blue/Yellow', sub: 'Richardson 112 Trucker',
    img: 'https://richardson.picarioxpo.com/112_FINAL.pfs?1=1&width=600&height=356&p.tn=White.jpg,Columbia%20Blue.jpg,Yellow_220.jpg,Yellow_220.jpg,White.jpg,Birch.jpg,Columbia%20Blue.jpg' },
  { id: 'hat7', label: '112 — Columbia Blue/White/Navy', sub: 'Richardson 112 Trucker',
    img: 'https://richardson.picarioxpo.com/112_FINAL.pfs?1=1&width=600&height=356&p.tn=Columbia%20Blue.jpg,White.jpg,Navy.jpg,Navy.jpg,Columbia%20Blue.jpg,White.jpg,White.jpg' },
];

// ranking[i] = hatId at position i (0 = 1st choice); null if not yet assigned
let ranking = [];
let liveVotes = {};

// ── Grid ─────────────────────────────────────────────────────────────────────

function buildGrid() {
  const grid = document.getElementById('hatGrid');
  HATS.forEach(hat => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + hat.id;
    card.innerHTML = `
      <div class="rank-badge empty" id="badge-${hat.id}">?</div>
      <img src="${hat.img}" alt="${hat.label}" loading="lazy" />
      <div class="card-label">${hat.label}</div>
      <div class="card-sub">${hat.sub}</div>
      <div class="rank-hint" id="hint-${hat.id}">Tap to rank</div>`;
    card.onclick = () => toggleRank(hat.id);
    grid.appendChild(card);
  });
}

function toggleRank(hatId) {
  const pos = ranking.indexOf(hatId);
  if (pos !== -1) {
    // Remove from ranking
    ranking.splice(pos, 1);
  } else {
    // Append to ranking
    ranking.push(hatId);
  }
  updateGrid();
}

function resetRanking() {
  ranking = [];
  updateGrid();
}

function updateGrid() {
  HATS.forEach(hat => {
    const card = document.getElementById('card-' + hat.id);
    const badge = document.getElementById('badge-' + hat.id);
    const hint = document.getElementById('hint-' + hat.id);
    const pos = ranking.indexOf(hat.id);
    if (pos !== -1) {
      card.classList.add('ranked');
      badge.classList.remove('empty');
      badge.textContent = pos + 1;
      hint.textContent = 'Tap to remove';
    } else {
      card.classList.remove('ranked');
      badge.classList.add('empty');
      badge.textContent = '?';
      hint.textContent = 'Tap to rank';
    }
  });

  const n = ranking.length;
  const total = HATS.length;
  document.getElementById('progressFill').style.width = `${(n / total) * 100}%`;
  document.getElementById('progressLabel').textContent = `${n} of ${total} ranked`;

  document.getElementById('submitBtn').disabled = !(n === total && getVoterName());
}


// ── Submit ────────────────────────────────────────────────────────────────────

async function submitVote() {
  const name = getVoterName();
  if (!name || ranking.length !== HATS.length) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const voterKey = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  try {
    await setDoc(doc(db, 'surveys', SURVEY_ID, 'votes', voterKey), {
      name,
      ranking: [...ranking],
      votedAt: serverTimestamp(),
    });
    showToast(`Ranking saved for ${name}! 🎉`);
    showResults();
  } catch (err) {
    showError('Could not save your vote. Please try again.');
    console.error(err);
    btn.disabled = false;
    btn.textContent = 'Submit Ranking';
  }
}

document.getElementById('submitBtn').addEventListener('click', submitVote);

// ── Live Firestore ────────────────────────────────────────────────────────────

onSnapshot(votesCol, (snap) => {
  liveVotes = {};
  snap.docs.forEach(d => { liveVotes[d.id] = d.data(); });
  if (document.getElementById('resultsPanel').classList.contains('show')) renderResults();
}, (err) => {
  showError('Could not load live results. Check your connection.');
  console.error(err);
});

// ── RCV ───────────────────────────────────────────────────────────────────────

function runRCV(ballots) {
  // ballots: array of arrays (ordered hat IDs, first = top choice)
  let active = new Set(HATS.map(h => h.id));
  const rounds = [];

  while (active.size > 1) {
    const tally = {};
    active.forEach(id => tally[id] = 0);

    let counted = 0;
    ballots.forEach(ballot => {
      const choice = ballot.find(id => active.has(id));
      if (choice) { tally[choice]++; counted++; }
    });

    rounds.push({ tally: { ...tally }, total: counted, eliminated: null });

    // Majority check
    const majority = Object.entries(tally).find(([, v]) => v / counted > 0.5);
    if (majority) {
      rounds[rounds.length - 1].winner = majority[0];
      return { winner: majority[0], rounds };
    }

    // Eliminate lowest (ties: eliminate all with same lowest count)
    const minVotes = Math.min(...Object.values(tally));
    const losers = Object.entries(tally).filter(([, v]) => v === minVotes).map(([id]) => id);
    // Eliminate one loser (the one ranked worst on average as tiebreak, simplified: first found)
    const loser = losers[0];
    rounds[rounds.length - 1].eliminated = loser;
    active.delete(loser);

    if (active.size === 1) {
      const last = [...active][0];
      rounds.push({ tally: { [last]: counted }, total: counted, eliminated: null, winner: last });
      return { winner: last, rounds };
    }
  }

  const last = [...active][0];
  return { winner: last, rounds };
}

// ── Results render ────────────────────────────────────────────────────────────

function renderResults() {
  const allBallots = Object.values(liveVotes)
    .filter(v => Array.isArray(v.ranking) && v.ranking.length > 0)
    .map(v => v.ranking);

  const totalVoters = allBallots.length;
  document.getElementById('totalLabel').textContent =
    totalVoters === 0 ? 'No votes yet' : `${totalVoters} ranking${totalVoters !== 1 ? 's' : ''} submitted`;

  if (totalVoters === 0) {
    document.getElementById('winnerCard').innerHTML =
      '<div class="crown">🗳️</div><h2 style="color:#aaa">No votes yet</h2><p class="winner-sub">Be the first to rank!</p>';
    document.getElementById('roundsContent').innerHTML = '';
    return;
  }

  const { winner, rounds } = runRCV(allBallots);
  const winnerHat = HATS.find(h => h.id === winner);

  // Winner card
  const finalRound = rounds[rounds.length - 1];
  const winnerVotes = finalRound.tally[winner] ?? 0;
  const winnerPct = Math.round((winnerVotes / finalRound.total) * 100);
  document.getElementById('winnerCard').innerHTML = `
    <div class="crown">🏆</div>
    <h2>${winnerHat.label}</h2>
    <p class="winner-sub">${winnerHat.sub} · Won in round ${rounds.length} with ${winnerVotes} votes (${winnerPct}%)</p>
    <img src="${winnerHat.img}" alt="${winnerHat.label}" />`;

  // Elimination rounds
  document.getElementById('roundsContent').innerHTML = rounds.map((round, i) => {
    const sorted = Object.entries(round.tally).sort((a, b) => b[1] - a[1]);
    const maxVotes = Math.max(...sorted.map(([, v]) => v), 1);

    const rows = sorted.map(([hatId, votes]) => {
      const hat = HATS.find(h => h.id === hatId);
      const pct = Math.round((votes / Math.max(round.total, 1)) * 100);
      const barW = Math.round((votes / maxVotes) * 100);
      const isElim = hatId === round.eliminated;
      const isWin = hatId === round.winner;
      const barClass = isElim ? 'eliminated-bar' : 'winner-bar';
      return `
        <div class="result-row ${isElim ? 'eliminated' : ''}">
          <img src="${hat.img}" alt="${hat.label}" />
          <div class="result-label-wrap">
            <div class="result-label">${hat.label} ${isElim ? '🚫' : isWin ? '✅' : ''}</div>
            <div class="bar-track">
              <div class="bar-fill ${barClass}" style="width:${barW}%"></div>
              ${votes > 0
                ? `<span class="${barW > 30 ? 'bar-pct' : 'bar-pct-light'}">${votes} · ${pct}%</span>`
                : ''}
            </div>
            ${isElim ? `<div class="eliminated-label">Eliminated this round</div>` : ''}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="round-block">
        <div class="round-label">Round ${i + 1}${round.winner ? ' — Winner declared' : ''}</div>
        ${rows}
      </div>`;
  }).join('');
}

function showResults() {
  document.getElementById('survey').style.display = 'none';
  document.getElementById('resultsPanel').classList.add('show');
  renderResults();
}

window.showSurvey = function() {
  document.getElementById('survey').style.display = 'block';
  document.getElementById('resultsPanel').classList.remove('show');
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showError(msg) {
  const b = document.getElementById('errorBanner');
  b.style.display = 'block';
  b.textContent = msg;
}

buildGrid();
buildNameField(); // always show text input immediately

// Upgrade to dropdown if roster loads from Firestore
if (teamId) {
  getDoc(doc(db, 'surveys', SURVEY_ID, 'rosters', teamId))
    .then(snap => {
      if (snap.exists() && (snap.data().players ?? []).length > 0) {
        rosterNames = snap.data().players;
        const container = document.getElementById('nameField');
        if (container) container.innerHTML = '';
        buildNameField();
      }
    })
    .catch(() => {});
}
</script>
</body>
</html>
