<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravenwood Brewers Hat Vote</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1923;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 32px 16px;
  }
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #f5c842;
    letter-spacing: 1px;
  }
  .header p {
    color: #aaa;
    margin-top: 8px;
    font-size: 1rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto 40px;
  }
  .card {
    background: #1a2535;
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }
  .card:hover {
    border-color: #f5c842;
    background: #1f2e42;
    transform: translateY(-2px);
  }
  .card.selected {
    border-color: #f5c842;
    background: #1f2e42;
    box-shadow: 0 0 0 3px rgba(245,200,66,0.25);
  }
  .card img {
    width: 100%;
    border-radius: 8px;
    display: block;
    background: #fff;
  }
  .card-label {
    margin-top: 12px;
    font-weight: 700;
    font-size: 0.95rem;
    color: #f0f0f0;
  }
  .card-sub {
    font-size: 0.8rem;
    color: #888;
    margin-top: 3px;
  }
  .check {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px;
    height: 28px;
    background: #f5c842;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    color: #0f1923;
    font-size: 14px;
    font-weight: 900;
  }
  .card.selected .check { display: flex; }

  .name-section {
    max-width: 400px;
    margin: 0 auto 24px;
    text-align: center;
  }
  .name-section label {
    display: block;
    color: #aaa;
    font-size: 0.9rem;
    margin-bottom: 8px;
  }
  .name-section input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 2px solid #2a3a50;
    background: #1a2535;
    color: #f0f0f0;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
  }
  .name-section input:focus {
    border-color: #f5c842;
  }

  .submit-wrap {
    text-align: center;
    margin-top: 10px;
  }
  .submit-btn {
    background: #f5c842;
    color: #0f1923;
    font-weight: 800;
    font-size: 1.1rem;
    padding: 14px 48px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  .submit-btn:hover { background: #ffd84d; transform: scale(1.03); }
  .submit-btn:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; }

  .results-wrap {
    max-width: 700px;
    margin: 0 auto;
    display: none;
    animation: fadein 0.4s ease;
  }
  .results-wrap.show { display: block; }
  @keyframes fadein { from { opacity:0; transform: translateY(10px); } to { opacity:1; } }

  .results-wrap h2 {
    text-align: center;
    color: #f5c842;
    font-size: 1.5rem;
    margin-bottom: 24px;
  }
  .result-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .result-row img {
    width: 80px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
    background: #fff;
    flex-shrink: 0;
  }
  .result-label-wrap { flex: 1; }
  .result-label { font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; }
  .bar-track {
    background: #2a3a50;
    border-radius: 20px;
    height: 22px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    background: #f5c842;
    border-radius: 20px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    min-width: 2px;
  }
  .bar-count {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.75rem;
    font-weight: 700;
    color: #0f1923;
    mix-blend-mode: multiply;
  }
  .bar-count-light {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.75rem;
    font-weight: 700;
    color: #f0f0f0;
  }
  .voters {
    font-size: 0.75rem;
    color: #888;
    margin-top: 3px;
  }
  .back-btn {
    display: block;
    margin: 30px auto 0;
    background: transparent;
    border: 2px solid #f5c842;
    color: #f5c842;
    font-weight: 700;
    padding: 10px 32px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(245,200,66,0.1); }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #f5c842;
    color: #0f1923;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 0.95rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>⚾ Ravenwood Brewers Hat Vote</h1>
  <p>Pick your favorite lid for the 2026 season — one vote per player.</p>
</div>

<div id="survey">
  <div class="name-section">
    <label>Your name (so we know who voted)</label>
    <input type="text" id="voterName" placeholder="e.g. Dave S." />
  </div>

  <div class="grid" id="hatGrid"></div>

  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" disabled onclick="submitVote()">Cast My Vote</button>
  </div>
</div>

<div class="results-wrap" id="resultsPanel">
  <h2>📊 Current Standings</h2>
  <div id="resultsContent"></div>
  <button class="back-btn" onclick="showSurvey()">← Vote Again / Change Vote</button>
</div>

<div class="toast" id="toast"></div>

<script>
const HATS = [
  {
    id: 'hat1',
    label: '212 — Navy/Gold',
    sub: 'Richardson 212 Fitted',
    img: 'https://richardson.picarioxpo.com/212_FINAL.pfs?1=1&width=600&height=356&p.tn=Navy.jpg,Navy.jpg,Gold.jpg,Gold.jpg,Gold.jpg,Gold.jpg',
    url: 'https://m2.richardsonsports.com/212.html'
  },
  {
    id: 'hat2',
    label: '212 — All Gold',
    sub: 'Richardson 212 Fitted',
    img: 'https://richardson.picarioxpo.com/212_FINAL.pfs?1=1&width=600&height=356&p.tn=Gold.jpg,Gold.jpg,Gold.jpg,Gold.jpg,Gold.jpg,Gold.jpg',
    url: 'https://m2.richardsonsports.com/212.html'
  },
  {
    id: 'hat3',
    label: '172 — Gold/White/Navy',
    sub: 'Richardson 172 Split Front',
    img: 'https://richardson.picarioxpo.com/172_FINAL.pfs?1=1&width=600&height=356&p.tn=Gold.jpg,white.jpg,Navy.jpg,Gold.jpg,Navy.jpg,Navy.jpg,white.jpg,white.jpg,white.jpg',
    url: 'https://m2.richardsonsports.com/172.html'
  },
  {
    id: 'hat4',
    label: '185 — Solid Navy',
    sub: 'Richardson 185 Wool Blend',
    img: 'https://richardson.picarioxpo.com/185_FINAL.pfs?1=1&width=600&height=356&p.tn=Navy.jpg,Navy.jpg,Navy.jpg,Navy.jpg,Navy.jpg,Navy.jpg',
    url: 'https://m2.richardsonsports.com/185.html'
  },
  {
    id: 'hat5',
    label: '112 — Cream/Navy/Amber',
    sub: 'Richardson 112 Trucker',
    img: 'https://richardson.picarioxpo.com/112_FINAL.pfs?1=1&width=600&height=356&p.tn=112cream.jpg,Navy.jpg,AmberGold.jpg,AmberGold.jpg,112cream.jpg,Navy.jpg',
    url: 'https://m2.richardsonsports.com/112.html'
  },
  {
    id: 'hat6',
    label: '112 — White/Columbia Blue/Yellow',
    sub: 'Richardson 112 Trucker',
    img: 'https://richardson.picarioxpo.com/112_FINAL.pfs?1=1&width=600&height=356&p.tn=White.jpg,Columbia%20Blue.jpg,Yellow_220.jpg,Yellow_220.jpg,White.jpg,Birch.jpg,Columbia%20Blue.jpg',
    url: 'https://m2.richardsonsports.com/112.html'
  },
  {
    id: 'hat7',
    label: '112 — Columbia Blue/White/Navy',
    sub: 'Richardson 112 Trucker',
    img: 'http://richardson.picarioxpo.com/112_FINAL.pfs?1=1&width=600&height=356&p.tn=Columbia%20Blue.jpg,White.jpg,Navy.jpg,Navy.jpg,Columbia%20Blue.jpg,White.jpg,White.jpg',
    url: 'https://m2.richardsonsports.com/112.html'
  }
];

// Simple in-memory vote storage (persists during session)
let votes = {};
let selectedHat = null;
let hasVoted = false;

function buildGrid() {
  const grid = document.getElementById('hatGrid');
  grid.innerHTML = '';
  HATS.forEach(hat => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + hat.id;
    card.innerHTML = `
      <div class="check">✓</div>
      <img src="${hat.img}" alt="${hat.label}" loading="lazy" />
      <div class="card-label">${hat.label}</div>
      <div class="card-sub">${hat.sub} &nbsp;·&nbsp; <a href="${hat.url}" target="_blank" style="color:#f5c842;font-size:0.75rem;">details ↗</a></div>
    `;
    card.onclick = () => selectHat(hat.id);
    grid.appendChild(card);
  });
}

function selectHat(id) {
  if (selectedHat) {
    document.getElementById('card-' + selectedHat)?.classList.remove('selected');
  }
  selectedHat = id;
  document.getElementById('card-' + id)?.classList.add('selected');
  document.getElementById('submitBtn').disabled = !document.getElementById('voterName').value.trim();
}

document.getElementById('voterName').addEventListener('input', () => {
  document.getElementById('submitBtn').disabled = !(selectedHat && document.getElementById('voterName').value.trim());
});

function submitVote() {
  const name = document.getElementById('voterName').value.trim();
  if (!name || !selectedHat) return;

  // Record vote (overwrite if same person votes again)
  votes[name.toLowerCase()] = { hat: selectedHat, name };

  showToast(`Vote recorded for ${name}! 🎉`);
  showResults();
}

function showResults() {
  document.getElementById('survey').style.display = 'none';
  const panel = document.getElementById('resultsPanel');
  panel.classList.add('show');

  // Tally
  const tally = {};
  const votersByHat = {};
  HATS.forEach(h => { tally[h.id] = 0; votersByHat[h.id] = []; });
  Object.values(votes).forEach(v => {
    tally[v.hat]++;
    votersByHat[v.hat].push(v.name);
  });

  const maxVotes = Math.max(...Object.values(tally), 1);
  const total = Object.values(tally).reduce((a,b) => a+b, 0);

  const sorted = [...HATS].sort((a,b) => tally[b.id] - tally[a.id]);

  const content = document.getElementById('resultsContent');
  content.innerHTML = sorted.map(hat => {
    const count = tally[hat.id];
    const pct = Math.round((count / Math.max(total,1)) * 100);
    const barWidth = Math.round((count / maxVotes) * 100);
    const voters = votersByHat[hat.id];
    return `
      <div class="result-row">
        <img src="${hat.img}" alt="${hat.label}" />
        <div class="result-label-wrap">
          <div class="result-label">${hat.label} <span style="color:#f5c842;font-weight:900">${count > 0 ? `${pct}%` : ''}</span></div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${barWidth}%"></div>
            ${count > 0 ? `<span class="bar-count">${count} vote${count!==1?'s':''}</span>` : ''}
          </div>
          ${voters.length ? `<div class="voters">${voters.join(', ')}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function showSurvey() {
  document.getElementById('survey').style.display = 'block';
  document.getElementById('resultsPanel').classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

buildGrid();
</script>

</body>
</html>
